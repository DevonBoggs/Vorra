<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    user-select: none;
    -webkit-app-region: drag;
  }
  .container {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(145deg, #060a11, #0b1120);
    border-radius: 16px;
    border: 1px solid rgba(34, 211, 160, 0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo-wrap {
    position: relative;
    width: 90px; height: 90px;
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease-out;
  }
  .logo-glow {
    position: absolute; inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,211,160,0.12) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }
  .logo {
    position: relative;
    width: 90px; height: 90px;
  }
  .title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #06d6a0, #118ab2, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    animation: fadeUp 0.7s ease-out;
  }
  .subtitle {
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: fadeUp 0.9s ease-out;
  }
  .progress-track {
    width: 180px; height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
    animation: fadeUp 1.1s ease-out;
  }
  .progress-bar {
    width: 40%; height: 100%;
    background: linear-gradient(90deg, #06d6a0, #118ab2);
    border-radius: 2px;
    animation: slide 1.4s ease-in-out infinite;
  }
  .status {
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    animation: fadeUp 1.2s ease-out;
  }
  .version {
    position: absolute;
    bottom: 14px; right: 18px;
    color: rgba(255,255,255,0.15);
    font-size: 10px;
    font-family: 'Consolas', monospace;
  }
  @keyframes slide {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(350%); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <svg class="logo" viewBox="0 0 40 40" fill="none">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="40" y2="40">
          <stop offset="0%" stop-color="#06d6a0"/>
          <stop offset="50%" stop-color="#118ab2"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
      <path d="M20 3L35 11.5v17L20 37 5 28.5v-17z" fill="url(#sg)" opacity="0.10" stroke="url(#sg)" stroke-width="1.2"/>
      <path d="M12 14l8 14 8-14" stroke="url(#sg)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="20" cy="10" r="2" fill="url(#sg)" opacity="0.85"/>
      <path d="M20 10l0 -4" stroke="url(#sg)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    </svg>
  </div>
  <div class="title">VORRA</div>
  <div class="subtitle">Study & Life Planner</div>
  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>
  <div class="status" id="status">Starting...</div>
  <div class="version" id="ver"></div>
</div>
<script>
  // Status updates from main process via query params or postMessage
  const params = new URLSearchParams(window.location.search);
  const ver = params.get('v');
  if (ver) document.getElementById('ver').textContent = 'v' + ver;

  // Cycle through status messages for visual feedback
  const messages = ['Starting...', 'Loading database...', 'Starting server...', 'Preparing workspace...'];
  let idx = 0;
  setInterval(() => {
    idx = (idx + 1) % messages.length;
    document.getElementById('status').textContent = messages[idx];
  }, 1200);
</script>
</body>
</html>
