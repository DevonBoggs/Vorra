async function runCheck() {
  const tbody = document.getElementById('results');
  const prog = document.getElementById('progress');
  tbody.innerHTML = '';
  let ok = 0, fail = 0, total = STREAMS.length;
  
  for (let i = 0; i < total; i++) {
    const s = STREAMS[i];
    prog.textContent = `Checking ${i+1}/${total}... (${ok} OK, ${fail} failed)`;
    const row = document.createElement('tr');
    row.innerHTML = `<td><img src="https://img.youtube.com/vi/${s.vid}/default.jpg" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2245%22><rect fill=%22%23333%22 width=%2260%22 height=%2245%22/><text x=%2230%22 y=%2225%22 fill=%22red%22 text-anchor=%22middle%22 font-size=%2210%22>ERR</text></svg>'"/></td><td>${s.vid}</td><td>${s.name}</td><td>${s.cat}</td><td class="pending">...</td><td></td>`;
    tbody.appendChild(row);
    
    try {
      const r = await fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + s.vid);
      const d = await r.json();
      if (d.error) {
        row.cells[4].className = 'err';
        row.cells[4].textContent = 'BROKEN';
        row.cells[5].textContent = d.error;
        fail++;
      } else {
        row.cells[4].className = 'ok';
        row.cells[4].textContent = 'OK';
        row.cells[5].textContent = d.title || '(no title)';
        ok++;
      }
    } catch(e) {
      row.cells[4].className = 'err';
      row.cells[4].textContent = 'ERROR';
      row.cells[5].textContent = e.message;
      fail++;
    }
    // Small delay to avoid rate-limiting
    await new Promise(r => setTimeout(r, 200));
  }
  prog.innerHTML = `<b>Done!</b> ${ok} OK, ${fail} failed out of ${total}`;
}
